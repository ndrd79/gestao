<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Sistema de Gestão</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1258e2",
                        "primary-hover": "#0e46b5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-[480px] bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden relative">
<!-- Header Image / Logo Placeholder -->
<div class="w-full h-48 bg-cover bg-center relative" data-alt="Modern clean car fleet in a bright garage" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDNtNCxk009GLOGedREFVKJeU9V5030grI5z9HR0fcOB3vW7cX7QI05YkOUXD6I3b2eDr5OMsxF3_WTXs3qD8SDupDr1ayGpuqKpAaqTqdJ793f-xTdAg2JDkr0G5AJe-I-0CrNhfbmXQI-ueqC8i_sKUFBodWFTnBjdJBv7cGL36KouQ9Na70dEEIiBxBwM90Qek-Byj6EKYoVDSsY29CLwSB3BOmK3Be59PLsWeoo5iktflD1EFUbBOMxTsyqOJWoKTozTEfmUyeF');">
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-6">
<!-- Logo Icon -->
<div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center mb-2 shadow-md">
<span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
</div>
</div>
</div>
<!-- Content Container -->
<div class="p-8 pt-6 flex flex-col gap-6">
<!-- Header Text -->
<div>
<h1 class="text-slate-900 font-display text-2xl font-bold leading-tight mb-2">Sistema de Gestão de Veículos</h1>
<p class="text-slate-500 font-display text-sm font-normal">Bem-vindo de volta, por favor faça login na sua conta.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 font-medium text-sm" for="email">E-mail corporativo</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 bg-white text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-normal" id="email" placeholder="seu@empresa.com" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none select-none">mail</span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-900 font-medium text-sm" for="password">Senha</label>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 pr-12 rounded-lg border border-slate-200 bg-white text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-normal" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 top-0 h-full px-3 text-slate-400 hover:text-slate-600 flex items-center justify-center rounded-r-lg transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-primary text-sm font-medium hover:underline hover:text-primary-hover transition-colors" href="#">Esqueci minha senha</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 mt-2 bg-primary hover:bg-primary-hover text-white font-medium rounded-lg shadow-sm shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="button">
<span>Entrar</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="text-center pt-2 border-t border-slate-100">
<p class="text-slate-500 text-xs">
                    Precisa de acesso? <a class="text-primary font-medium hover:underline" href="#">Contate o administrador</a>
</p>
</div>
</div>
</div>
</body></html>
